<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Profile | KaamSetu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pine: "#0f5132",
            clay: "#d46a3a",
            mist: "#eef4ef",
            ink: "#122018"
          },
          fontFamily: {
            display: ["Space Grotesk", "sans-serif"],
            body: ["DM Sans", "sans-serif"]
          }
        }
      }
    };
  </script>
</head>
<body class="bg-stone-50 font-body text-ink">
  <header class="sticky top-0 z-50 border-b border-stone-200 bg-white/90 backdrop-blur">
    <nav class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
      <a href="/" class="font-display text-2xl font-bold text-pine">KaamSetu</a>
      <div class="hidden gap-6 text-sm font-medium md:flex">
        <a href="/" class="text-stone-600 hover:text-pine">Home</a>
        <a href="/services" class="text-stone-600 hover:text-pine">Services</a>
        <a href="/find-workers" class="text-pine">Find Workers</a>
        <a href="/profile-setup" class="text-stone-600 hover:text-pine">Join Us</a>
      </div>
      <div class="flex gap-3">
        <a href="/find-workers" class="rounded-full border border-stone-300 px-4 py-2 text-sm font-medium text-stone-700">Back to Search</a>
        <a href="/profile-setup" class="rounded-full bg-pine px-4 py-2 text-sm font-semibold text-white">Join KaamSetu</a>
      </div>
    </nav>
  </header>

  <main class="mx-auto max-w-6xl px-6 py-10">
    <div id="status" class="rounded-2xl bg-mist px-4 py-3 text-sm text-stone-700">Loading worker profile...</div>

    <section id="profile-shell" class="mt-6 hidden">
        <div class="rounded-[2rem] bg-white p-8 shadow-sm ring-1 ring-stone-200">
          <div class="flex flex-col gap-8 lg:flex-row lg:items-start lg:justify-between">
          <div class="flex flex-col gap-6 md:flex-row">
            <img id="worker-image" src="" alt="" class="h-28 w-28 rounded-[2rem] object-cover">
            <div>
              <div class="flex flex-wrap items-center gap-3">
                <h1 id="worker-name" class="font-display text-4xl font-bold"></h1>
                <span id="worker-verification" class="rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em]"></span>
              </div>
              <p id="worker-location" class="mt-3 text-sm text-stone-500"></p>
              <div class="mt-4 flex flex-wrap gap-4 text-sm text-stone-600">
                <span id="worker-rating"></span>
                <span id="worker-radius"></span>
                <span id="worker-availability"></span>
              </div>
              <div class="mt-6 flex flex-wrap gap-3">
                <a href="/find-workers" class="rounded-2xl bg-pine px-5 py-3 text-sm font-semibold text-white">Back to workers</a>
                <a href="/profile-setup" class="rounded-2xl border border-stone-300 px-5 py-3 text-sm font-semibold text-stone-700">Get started</a>
              </div>
            </div>
          </div>
          <div class="rounded-[2rem] bg-mist px-6 py-5 text-right">
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-stone-500">Daily rate</p>
            <p id="worker-rate" class="mt-2 font-display text-4xl font-bold text-pine"></p>
          </div>
        </div>
      </div>

      <div class="mt-6 grid gap-6 lg:grid-cols-[1.15fr_0.85fr]">
        <section class="space-y-6">
          <article class="rounded-[2rem] bg-white p-8 shadow-sm ring-1 ring-stone-200">
            <p class="text-sm font-semibold uppercase tracking-[0.22em] text-pine">About</p>
            <p id="worker-bio" class="mt-4 text-base leading-8 text-stone-600"></p>
          </article>

          <article class="rounded-[2rem] bg-white p-8 shadow-sm ring-1 ring-stone-200">
            <p class="text-sm font-semibold uppercase tracking-[0.22em] text-pine">Skills</p>
            <div id="skills" class="mt-5 flex flex-wrap gap-3"></div>
          </article>

          <article class="rounded-[2rem] bg-white p-8 shadow-sm ring-1 ring-stone-200">
            <p class="text-sm font-semibold uppercase tracking-[0.22em] text-pine">Languages</p>
            <div id="languages" class="mt-5 flex flex-wrap gap-3"></div>
          </article>
        </section>

        <aside class="space-y-6">
          <article class="rounded-[2rem] bg-white p-8 shadow-sm ring-1 ring-stone-200">
            <p class="text-sm font-semibold uppercase tracking-[0.22em] text-pine">Availability</p>
            <div id="availability-list" class="mt-5 space-y-3 text-sm text-stone-600"></div>
          </article>

          <article class="rounded-[2rem] bg-white p-8 shadow-sm ring-1 ring-stone-200">
            <p class="text-sm font-semibold uppercase tracking-[0.22em] text-pine">Review summary</p>
            <div class="mt-5 grid gap-4 sm:grid-cols-2">
              <div class="rounded-2xl bg-mist p-5">
                <p class="text-xs uppercase tracking-[0.2em] text-stone-500">Average rating</p>
                <p id="summary-rating" class="mt-2 font-display text-4xl font-bold text-pine"></p>
              </div>
              <div class="rounded-2xl bg-mist p-5">
                <p class="text-xs uppercase tracking-[0.2em] text-stone-500">Total reviews</p>
                <p id="summary-reviews" class="mt-2 font-display text-4xl font-bold text-pine"></p>
              </div>
            </div>
            <div id="reviews-list" class="mt-5 space-y-3"></div>
            <p id="review-note" class="mt-4 text-sm text-stone-500"></p>
          </article>
        </aside>
      </div>
    </section>
  </main>

  <script>
    const pageToken = new URLSearchParams(window.location.search).get("token");
    if (pageToken) {
      localStorage.setItem("kaamsetu_access_token", pageToken);
      const cleanUrl = new URL(window.location.href);
      cleanUrl.searchParams.delete("token");
      cleanUrl.searchParams.delete("profile_completed");
      window.history.replaceState({}, "", cleanUrl.pathname + cleanUrl.search);
    }

    const pathParts = window.location.pathname.split("/").filter(Boolean);
    const workerId = pathParts[pathParts.length - 1];
    const statusBox = document.getElementById("status");
    const profileShell = document.getElementById("profile-shell");

    function chip(text) {
      return `<span class="rounded-full bg-mist px-4 py-2 text-sm font-medium text-pine">${text}</span>`;
    }

    async function loadProfile() {
      if (!workerId || workerId === "worker-profile") {
        statusBox.textContent = "Open this page from worker search to view a real worker profile.";
        return;
      }

      try {
        const [workerResponse, availabilityResponse, reviewsResponse] = await Promise.all([
          fetch(`/workers/${workerId}`),
          fetch(`/workers/${workerId}/availability`),
          fetch(`/workers/${workerId}/reviews`)
        ]);

        if (!workerResponse.ok) {
          throw new Error("Worker not found");
        }

        const workerPayload = await workerResponse.json();
        const availabilityPayload = await availabilityResponse.json();
        const reviewsPayload = await reviewsResponse.json();
        const worker = workerPayload.data;
        const availability = availabilityPayload.data || [];
        const reviewIds = reviewsPayload.data || [];

        document.getElementById("worker-image").src = worker.profile_photo_url || "https://placehold.co/160x160/e8f5ec/0f5132?text=KS";
        document.getElementById("worker-image").alt = worker.full_name;
        document.getElementById("worker-name").textContent = worker.full_name;
        document.getElementById("worker-location").textContent = `${worker.location_text} | Coordinates ${worker.latitude}, ${worker.longitude}`;
        document.getElementById("worker-rating").textContent = `Rating ${Number(worker.average_rating).toFixed(1)} from ${worker.total_reviews} reviews`;
        document.getElementById("worker-radius").textContent = `Service radius ${worker.service_radius_km} km`;
        document.getElementById("worker-availability").textContent = worker.available_today ? "Available today" : "Not marked available today";
        document.getElementById("worker-rate").textContent = `Rs ${Number(worker.daily_rate).toLocaleString()}`;
        document.getElementById("worker-bio").textContent = worker.bio || "This worker has not added a bio yet.";
        document.getElementById("skills").innerHTML = (worker.skills || []).map(chip).join("") || chip("No skills listed");
        document.getElementById("languages").innerHTML = (worker.languages || []).map(chip).join("") || chip("No languages listed");
        document.getElementById("summary-rating").textContent = Number(worker.average_rating).toFixed(1);
        document.getElementById("summary-reviews").textContent = worker.total_reviews;
        document.getElementById("review-note").textContent = reviewIds.length ? "Recent customer feedback is shown below." : "No review comments are available yet.";

        const verificationBadge = document.getElementById("worker-verification");
        verificationBadge.textContent = worker.verification_status;
        verificationBadge.className = worker.verification_status === "approved"
          ? "rounded-full bg-emerald-100 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-pine"
          : "rounded-full bg-stone-100 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-stone-600";

        const availabilityList = document.getElementById("availability-list");
        if (!availability.length) {
          availabilityList.innerHTML = '<div class="rounded-2xl bg-mist px-4 py-3">No date-wise availability has been added yet.</div>';
        } else {
          availabilityList.innerHTML = availability.map((entry) => `
            <div class="rounded-2xl bg-mist px-4 py-3">
              <div class="font-semibold text-ink">${entry.date}</div>
              <div class="mt-1 text-stone-600">Status: ${entry.status} | Emergency: ${entry.emergency_available ? "yes" : "no"}</div>
            </div>
          `).join("");
        }

        const reviewsList = document.getElementById("reviews-list");
        if (!reviewIds.length) {
          reviewsList.innerHTML = "";
        } else {
          reviewsList.innerHTML = reviewIds.slice(0, 3).map((review) => `
            <div class="rounded-2xl bg-mist px-4 py-3">
              <div class="flex items-center justify-between gap-4">
                <span class="text-sm font-semibold text-ink">Rating ${review.rating}/5</span>
                <span class="text-xs text-stone-500">${review.created_at ? new Date(review.created_at).toLocaleDateString() : ""}</span>
              </div>
              <p class="mt-2 text-sm text-stone-600">${review.comment || "No written comment provided."}</p>
            </div>
          `).join("");
        }

        statusBox.classList.add("hidden");
        profileShell.classList.remove("hidden");
      } catch (error) {
        statusBox.textContent = "Unable to load this worker profile right now.";
      }
    }

    loadProfile();
  </script>
</body>
</html>
